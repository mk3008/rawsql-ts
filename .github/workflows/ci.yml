name: CI

on:
  push:
    branches: [ main, develop, "release/*", "feature/*" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # Keep the compatibility matrix focused on the core package so Node 20/22/24 validate the same fast path.
    - name: Lint core package
      run: pnpm --filter "./packages/core" run lint

    - name: Build core package
      run: pnpm --filter "./packages/core" run build

    - name: Test core package
      run: pnpm --filter "./packages/core" run test

    # Coverage is expensive and does not need to run on every compatibility lane.
    - name: Run coverage tests
      if: matrix.node-version == '20.x'
      run: pnpm --filter "./packages/core" run coverage
      continue-on-error: true

    # Heavy dist-shape and consumer validation is limited to the main Node 20 lane to avoid triplicating CI cost.
    - name: Validate test-evidence boundaries and consumers
      if: matrix.node-version == '20.x'
      run: |
        pnpm -r --if-present --filter @rawsql-ts/test-evidence-core --filter @rawsql-ts/test-evidence-renderer-md --filter @rawsql-ts/shared-binder --filter @rawsql-ts/testkit-core --filter @rawsql-ts/testkit-postgres --filter @rawsql-ts/testkit-sqlite --filter @rawsql-ts/adapter-node-pg --filter @rawsql-ts/ztd-cli --filter @rawsql-ts/sql-contract --filter @rawsql-ts/sql-contract-zod run build
        pnpm -r --if-present --filter @rawsql-ts/test-evidence-core --filter @rawsql-ts/test-evidence-renderer-md --filter @rawsql-ts/testkit-core --filter @rawsql-ts/testkit-postgres --filter @rawsql-ts/testkit-sqlite --filter @rawsql-ts/adapter-node-pg --filter @rawsql-ts/sql-contract-zod run test
        pnpm --filter @rawsql-ts/sql-contract run test:consumer-validation
        pnpm --filter @rawsql-ts/shared-binder run test:consumer-validation
        pnpm --filter @rawsql-ts/ztd-cli run test:consumer-validation

  customer-consumer-guard:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run customer consumer guard
      run: pnpm verify:customer-consumers

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build core package
      run: pnpm --filter "./packages/core" run build

    - name: Run benchmarks
      run: pnpm --filter "./packages/core" run benchmark
      continue-on-error: true
