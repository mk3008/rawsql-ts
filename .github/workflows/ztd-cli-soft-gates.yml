name: ztd-cli Soft Gates

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

jobs:
  soft-gates:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run ztd-cli soft gates
      run: node scripts/run-ztd-cli-quality-gates.js soft
