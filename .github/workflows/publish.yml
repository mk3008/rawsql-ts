name: Publish (manual)

on:
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish_oidc:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.guard.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail unless running from main
        shell: bash
        run: |
          # npm Trusted Publishing (OIDC) is typically configured against the workflow file on the default branch.
          # Running this workflow from a feature branch can fail with ENEEDAUTH even if id-token is available.
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This publish workflow must be run from the main branch."
            echo "Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: corepack enable

      - run: pnpm --version

      - run: pnpm install --frozen-lockfile

      - name: Update npm
        shell: bash
        run: |
          # npm Trusted Publishing (OIDC) requires npm >= 11.5.1.
          npm install -g "npm@^11.5.1"
          npm --version

      # Safety guard: do not attempt a publish while a release PR is still pending.
      - name: Check for unapplied changesets
        id: guard
        shell: bash
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "::notice::Unapplied changesets exist. Run the Release PR workflow and merge that PR before publishing."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Build publish artifacts (dist/)
        if: ${{ steps.guard.outputs.should_publish == 'true' }}
        run: pnpm build:publish

      - name: Configure git identity for tags
        if: ${{ steps.guard.outputs.should_publish == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: OIDC diagnostics
        if: ${{ steps.guard.outputs.should_publish == 'true' }}
        shell: bash
        run: |
          echo "RAWSQL_PUBLISH_AUTH=oidc"
          echo "NPM_CONFIG_PROVENANCE=true"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+(set)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+(set)}"
          echo "NODE_AUTH_TOKEN=${NODE_AUTH_TOKEN:+(set)}"
          npm --version
          npm config get registry
          npm config get provenance || true
          # OIDC Trusted Publishing should not run with token auth. Drop NODE_AUTH_TOKEN for this check.
          env -u NODE_AUTH_TOKEN npm whoami && echo "npm auth: token/session is active (unexpected for pure OIDC)" || echo "npm auth: no token/session (expected for OIDC)"

      - name: Publish to npm (OIDC-compatible), tag, and create GitHub Releases
        if: ${{ steps.guard.outputs.should_publish == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          RAWSQL_PUBLISH_AUTH: "oidc"
        run: |
          # Prevent token-based auth from overriding OIDC Trusted Publishing.
          env -u NODE_AUTH_TOKEN node ./scripts/ci-publish.mjs
