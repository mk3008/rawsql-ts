name: PR Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, reopened, synchronize, edited, ready_for_review]

jobs:
  quick-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check retro gate
      run: node scripts/check-retro-clean.js

    - name: Check PR readiness contract
      run: |
        node scripts/check-pr-readiness.js \
          --base-sha "${{ github.event.pull_request.base.sha }}" \
          --head-sha "${{ github.event.pull_request.head.sha }}" \
          --event-path "$GITHUB_EVENT_PATH"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # PR checks stay on the main Node 20 lane so reviewers get one fast fail-fast signal.
    - name: Lint core package
      run: pnpm --filter "./packages/core" run lint

    - name: Build core package
      run: pnpm --filter "./packages/core" run build

    - name: Run unit tests (core)
      run: pnpm --filter "./packages/core" run test

    - name: Detect transfer DDL metadata changes
      id: transfer_ddl_metadata
      shell: bash
      run: |
        base_sha="${{ github.event.pull_request.base.sha }}"
        head_sha="${{ github.event.pull_request.head.sha }}"
        changed_files=$(git diff --name-only "$base_sha...$head_sha")
        printf '%s\n' "$changed_files"

        if printf '%s\n' "$changed_files" | grep -Eq '^(package\.json|packages/ddl-docs-cli/|packages/transfer/db/ddl/|packages/transfer/docs/(concepts|dfd|processes|scope|testing|review|technology)/|docs/(transfer-docs|review)\.md|docs/(authority|concepts|dfd|processes|roles|scope|testing|technology|rawsql-transfer)/|scripts/(generate-transfer-docs|verify-transfer-docs-drift)\.mjs|\.github/workflows/pr-check\.yml$)'; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Check transfer docs and metadata drift
      if: steps.transfer_ddl_metadata.outputs.run == 'true'
      run: pnpm verify:transfer-docs

    - name: Run parser benchmark (PR lightweight)
      run: pnpm run benchmark:parser:pr

    # Keep package validation lightweight in PRs; broader multi-version validation stays in push CI.
    - name: Check package.json validity
      run: |
        mkdir -p tmp
        pnpm pack --filter "./packages/core" --pack-destination ./tmp

    - name: Run unit tests (prisma-integration)
      run: echo "prisma-integration removed"

    - name: Check prisma-integration package
      run: echo "prisma-integration removed"
